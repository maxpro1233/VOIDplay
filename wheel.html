<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VØIDplay — Колесо фортуни</title>
<link rel="stylesheet" href="style.css">
<style>
.wheel-page{padding:calc(var(--header-h)+50px) 0 80px;min-height:100vh;}
.wheel-layout{display:grid;grid-template-columns:1fr 340px;gap:40px;align-items:start;}
.wheel-wrapper{display:flex;flex-direction:column;align-items:center;gap:28px;}
.wheel-container{position:relative;width:420px;height:420px;max-width:min(420px,90vw);}
.wheel-canvas-wrap{position:relative;width:100%;padding-bottom:100%;border-radius:50%;overflow:hidden;box-shadow:0 0 60px rgba(255,107,0,.25),0 0 120px rgba(255,107,0,.08);}
.wheel-canvas-wrap canvas{position:absolute;inset:0;width:100%;height:100%;}
.wheel-pointer{position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-top:32px solid var(--orange);filter:drop-shadow(0 0 12px var(--orange));z-index:10;}
.wheel-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:64px;height:64px;border-radius:50%;background:radial-gradient(circle,#ff8c00,#ff3a00);box-shadow:0 0 24px rgba(255,107,0,.7);display:flex;align-items:center;justify-content:center;font-size:22px;z-index:10;}
.spin-btn-wrap{text-align:center;}
.spin-info{font-size:13px;color:var(--muted);margin-top:10px;}
.result-panel{background:var(--surface);border:1px solid var(--border-o);border-radius:20px;padding:28px;position:relative;overflow:hidden;}
.result-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--orange),transparent);}
.result-title{font-size:13px;font-weight:700;color:var(--orange);letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;}
.result-display{text-align:center;padding:24px 16px;border:1px solid var(--border);border-radius:14px;background:var(--surface2);margin-bottom:18px;min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.res-emoji{font-size:48px;}
.res-amount{font-size:30px;font-weight:900;color:#ffb800;}
.res-label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.res-placeholder{font-size:13px;color:var(--dim);}
.rewards-list{display:flex;flex-direction:column;gap:7px;}
.reward-row{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;font-size:13px;}
.rr-emoji{font-size:17px;}
.rr-val{font-weight:900;color:#ffb800;}
.rr-chance{font-size:11px;color:var(--muted);}
.wheel-history{margin-top:36px;width:100%;}
.wheel-hist-list{display:flex;flex-direction:column;gap:7px;margin-top:12px;max-height:260px;overflow-y:auto;}
.wh-item{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 13px;}
.wh-emoji{font-size:19px;}
.wh-info{flex:1;}
.wh-val{font-size:14px;font-weight:900;color:#ffb800;}
.wh-time{font-size:11px;color:var(--muted);}
.wh-empty{font-size:13px;color:var(--muted);text-align:center;padding:20px;}
@media(max-width:800px){.wheel-layout{grid-template-columns:1fr;}.wheel-container{width:min(360px,88vw);}}
</style>
</head>
<body>
<header class="navbar" id="navbar"></header>
<div class="wheel-page">
  <div class="container">
    <div class="section-label" style="margin-bottom:8px">Колесо фортуни</div>
    <h2 class="section-title" style="margin-bottom:8px">🎡 Wheel of Fortune</h2>
    <p class="section-desc" style="margin-bottom:34px">Кожен крутяж коштує 100 монет. Виграш — від 0 до 1000!</p>
    <div class="wheel-layout">
      <div class="wheel-wrapper">
        <div class="wheel-container">
          <div class="wheel-pointer"></div>
          <div class="wheel-canvas-wrap">
            <canvas id="wheel-canvas" width="500" height="500"></canvas>
          </div>
          <div class="wheel-center">🎡</div>
        </div>
        <div class="spin-btn-wrap">
          <button class="btn btn-primary btn-lg" id="spin-btn" onclick="doSpin()">🎡 Крутити (100 монет)</button>
          <div class="spin-info">Баланс: 🪙 <span class="js-coins" id="wheel-balance">500</span> монет</div>
        </div>
        <div class="wheel-history">
          <div class="section-label">Мої спіни</div>
          <div class="wheel-hist-list" id="wheel-hist-list"><div class="wh-empty">Ти ще не крутив колесо 🎡</div></div>
        </div>
      </div>
      <div class="result-panel">
        <div class="result-title">🏆 Результат</div>
        <div class="result-display" id="result-display"><div class="res-placeholder">Крути колесо щоб побачити результат!</div></div>
        <div class="section-label" style="margin-bottom:10px;font-size:9.5px;">Можливі виграші</div>
        <div class="rewards-list" id="rewards-list"></div>
      </div>
    </div>
  </div>
</div>
<script src="script.js"></script>
<script>
requireAuth();
buildNavbar('wheel');
setLang(currentLang);
initMusic();

/* ══════════════════════════════════
   WHEEL SEGMENTS
   Pointer is at TOP (−π/2).
   Segment[i] spans from startAngle[i] to startAngle[i+1].
   The segment under the pointer when wheelAngle=0 is segment 0.
   So: pointer hits segment[i] when wheelAngle = -(i/N)*2π  (mod 2π)
══════════════════════════════════ */
const N=8;
const WHEEL_SEGS=[
  {label:'💰 50',   val:50,   bg:'#1e1e2e', accent:'#ff8800'},
  {label:'🚫 0',    val:0,    bg:'#2a1515', accent:'#ff3333'},
  {label:'💵 100',  val:100,  bg:'#0d1a28', accent:'#00d4ff'},
  {label:'💎 200',  val:200,  bg:'#1a0d2e', accent:'#c77dff'},
  {label:'🚫 0',    val:0,    bg:'#2a1515', accent:'#ff3333'},
  {label:'⭐ 1000', val:1000, bg:'#1a1e00', accent:'#ffe600'},
  {label:'💰 50',   val:50,   bg:'#1e1e2e', accent:'#ff8800'},
  {label:'💵 100',  val:100,  bg:'#0d1a28', accent:'#00d4ff'},
];
/* weights for picking */
const SEG_WEIGHTS=[28,30,20,12,0,2,8,0];

const REWARDS_TABLE=[
  {label:'50 монет',   val:50,   emoji:'💰',chance:'36%'},
  {label:'0 монет',    val:0,    emoji:'🚫',chance:'30%'},
  {label:'100 монет',  val:100,  emoji:'💵',chance:'28%'},
  {label:'200 монет',  val:200,  emoji:'💎',chance:'4%'},
  {label:'1000 монет', val:1000, emoji:'⭐',chance:'2%'},
];

document.getElementById('rewards-list').innerHTML=REWARDS_TABLE.map(r=>`
  <div class="reward-row">
    <span class="rr-emoji">${r.emoji}</span>
    <span>${r.label}</span>
    <span class="rr-chance">${r.chance}</span>
    <span class="rr-val">${r.val>0?'+'+r.val+' 🪙':'—'}</span>
  </div>`).join('');

/* ── DRAW ── */
const canvas=document.getElementById('wheel-canvas');
const ctx=canvas.getContext('2d');

/* wheelAngle: the rotation of the CANVAS (not the pointer).
   Segment i is "under the top pointer" when wheelAngle places
   its center at angle = -π/2  (pointing up).
   Segment i center (before rotation) = -π/2 + i*(2π/N) + π/N
   So the canvas rotation needed = 0 means seg 0 center is at top.
   We just draw with a base offset of -π/2 - π/N so seg 0 center
   starts at the top. */
const BASE= -Math.PI/2 - Math.PI/N;   // offset so seg 0 is under pointer at angle=0

function drawWheel(angle){
  const cx=250,cy=250,r=238;
  const arc=(2*Math.PI)/N;
  ctx.clearRect(0,0,500,500);
  WHEEL_SEGS.forEach((seg,i)=>{
    const start=BASE+angle+i*arc;
    const end=start+arc;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,end);ctx.closePath();
    ctx.fillStyle=seg.bg;ctx.fill();
    ctx.strokeStyle=seg.accent;ctx.lineWidth=2.5;ctx.stroke();
    ctx.beginPath();ctx.arc(cx,cy,r-5,start,end);
    ctx.strokeStyle=seg.accent+'55';ctx.lineWidth=9;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(start+arc/2);
    ctx.textAlign='right';ctx.fillStyle=seg.accent;
    ctx.font='bold 17px "Exo 2",sans-serif';
    ctx.shadowColor=seg.accent;ctx.shadowBlur=10;
    ctx.fillText(seg.label,r-16,6);
    ctx.restore();
  });
  ctx.beginPath();ctx.arc(cx,cy,40,0,2*Math.PI);
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,40);
  g.addColorStop(0,'#ff8c00');g.addColorStop(1,'#ff3a00');
  ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle='rgba(255,107,0,.6)';ctx.lineWidth=3;ctx.stroke();
}
drawWheel(0);

/* ── SPIN ── */
let spinning=false;
let rafId=null;

function pickSegIdx(){
  const total=SEG_WEIGHTS.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<SEG_WEIGHTS.length;i++){r-=SEG_WEIGHTS[i];if(r<=0)return i;}
  return 0;
}

function doSpin(){
  if(spinning)return;
  if(getBalance()<100){
    document.getElementById('result-display').innerHTML='<div class="res-placeholder" style="color:var(--red)">❌ Недостатньо монет!</div>';
    return;
  }
  spinning=true;
  setBalance(getBalance()-100);
  document.getElementById('wheel-balance').textContent=getBalance();
  document.getElementById('spin-btn').disabled=true;
  document.getElementById('result-display').innerHTML='<div class="res-placeholder">⏳ Крутимо...</div>';

  const targetIdx=pickSegIdx();

  /* The canvas rotation that puts segment[targetIdx] under the pointer:
     Each full wheel turn = 2π. Segment[i] is under pointer when
     wheelAngle = -i*(2π/N)  (mod 2π), because BASE offset already handles alignment.
     We want to spin forward (positive), so add multiple full turns. */
  const arc=(2*Math.PI)/N;
  const targetRot = (N - targetIdx) * arc; // positive rotation that brings seg[i] to top
  // normalize to [0, 2π)
  const targetNorm = ((targetRot % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
  const spins = 8 + Math.floor(Math.random()*4);
  const totalRotation = spins * 2 * Math.PI + targetNorm;

  playSpin();

  const dur=6000;
  const startTime=performance.now();
  // ALWAYS start from 0 — we'll keep the visual angle separately
  let visualAngle=0;

  function frame(now){
    const elapsed=now-startTime;
    const progress=Math.min(elapsed/dur,1);
    const ease=1-Math.pow(1-progress,4);
    visualAngle=totalRotation*ease;
    drawWheel(visualAngle);
    if(progress<1){
      rafId=requestAnimationFrame(frame);
    } else {
      drawWheel(totalRotation);
      spinning=false;
      document.getElementById('spin-btn').disabled=false;
      onSpinDone(WHEEL_SEGS[targetIdx]);
    }
  }
  if(rafId) cancelAnimationFrame(rafId);
  rafId=requestAnimationFrame(frame);
}

function onSpinDone(seg){
  const val=seg.val;
  setBalance(getBalance()+val);
  document.getElementById('wheel-balance').textContent=getBalance();
  const emoji=val===0?'🚫':val>=1000?'⭐':val>=200?'💎':val>=100?'💵':'💰';
  document.getElementById('result-display').innerHTML=`
    <div class="res-emoji" style="font-size:48px;animation:popIn .4s ease both;">${emoji}</div>
    <div class="res-amount">${val>0?'+'+val+' 🪙':'😢 Нічого'}</div>
    <div class="res-label">${val>=1000?'🎉 ДЖЕКПОТ!':val>=200?'💎 РІДКІСНЕ':val>=100?'👍 НЕПОГАНО':val>0?'💰 ЗВИЧАЙНЕ':'😞 НІЧОГО'}</div>`;
  if(val>0) coinRain(val>=1000?30:val>=200?15:8);
  const u=getActiveUser()||'g';
  let h=[];try{h=JSON.parse(localStorage.getItem('vp_wheel_'+u)||'[]');}catch(e){}
  h.unshift({val,emoji,time:new Date().toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'}),date:new Date().toLocaleDateString('uk-UA')});
  if(h.length>30)h.pop();
  localStorage.setItem('vp_wheel_'+u,JSON.stringify(h));
  renderWheelHistory(h);
}

function renderWheelHistory(h){
  const el=document.getElementById('wheel-hist-list');
  if(!h||!h.length){el.innerHTML='<div class="wh-empty">Ти ще не крутив колесо 🎡</div>';return;}
  el.innerHTML=h.map(e=>`<div class="wh-item"><div class="wh-emoji">${e.emoji}</div><div class="wh-info"><div class="wh-val">${e.val>0?'+'+e.val+' 🪙':'Нічого'}</div><div class="wh-time">${e.date} · ${e.time}</div></div></div>`).join('');
}

document.getElementById('wheel-balance').textContent=getBalance();
try{const u=getActiveUser()||'g';renderWheelHistory(JSON.parse(localStorage.getItem('vp_wheel_'+u)||'[]'));}catch(e){}
</script>
</body>
</html>
