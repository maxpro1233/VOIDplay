<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Реєстрація — VØIDplay</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Exo 2', sans-serif;
  background: #0a0a0b;
  color: #f0f0f0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background-image: radial-gradient(ellipse at 30% 50%, rgba(255,107,0,0.1) 0%, transparent 60%);
}

.lang-bar {
  position: fixed;
  top: 14px; right: 16px;
  display: flex; gap: 6px; z-index: 100;
}
.lang-btn {
  background: #18181d;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 6px 13px;
  color: #606070;
  font-family: 'Exo 2', sans-serif;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.lang-btn:hover { border-color: rgba(255,107,0,0.4); color: #ff8c00; }
.lang-btn.active {
  background: rgba(255,107,0,0.15);
  border-color: #ff6b00;
  color: #ff8c00;
}

.box {
  background: #111114;
  border: 1px solid rgba(255,107,0,0.2);
  border-radius: 20px;
  padding: 36px 32px;
  width: 100%; max-width: 420px;
  box-shadow: 0 0 60px rgba(255,107,0,0.08);
}

.logo { text-align: center; margin-bottom: 28px; }
.logo-title {
  font-size: 32px; font-weight: 900; letter-spacing: 4px;
  background: linear-gradient(135deg, #ff6b00, #ff8c00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display: block;
}
.logo-sub {
  font-size: 11px; color: #505060;
  letter-spacing: 6px; text-transform: uppercase; margin-top: 2px;
  display: block;
}

.tabs {
  display: flex; background: #18181d;
  border-radius: 10px; padding: 4px; margin-bottom: 24px; gap: 4px;
}
.tab {
  flex: 1; padding: 10px; border: none; background: none;
  color: #606070; font-family: 'Exo 2', sans-serif;
  font-size: 14px; font-weight: 700; border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
}
.tab.active { background: #ff6b00; color: #fff; }

.form { display: none; flex-direction: column; gap: 14px; }
.form.show { display: flex; }

.row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.field label {
  font-size: 11px; font-weight: 700; color: #606070;
  text-transform: uppercase; letter-spacing: 1px;
}
.field input {
  width: 100%; min-width: 0;
  background: #18181d;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px; padding: 13px 16px;
  color: #f0f0f0; font-family: 'Exo 2', sans-serif;
  font-size: 15px; outline: none;
  transition: border 0.2s, box-shadow 0.2s;
}
.field input:focus {
  border-color: #ff6b00;
  box-shadow: 0 0 0 3px rgba(255,107,0,0.12);
}
.field input::placeholder { color: #404050; }
.field input:disabled { opacity: 0.5; }

.error {
  background: rgba(255,58,58,0.1);
  border: 1px solid rgba(255,58,58,0.25);
  border-radius: 8px; padding: 10px 14px;
  font-size: 13px; color: #ff5555;
  display: none; text-align: center;
}
.error.show { display: block; }

.success-box {
  background: rgba(0,200,100,0.1);
  border: 1px solid rgba(0,200,100,0.25);
  border-radius: 8px; padding: 10px 14px;
  font-size: 13px; color: #00e676;
  display: none; text-align: center;
}
.success-box.show { display: block; }

.btn {
  background: linear-gradient(135deg, #ff6b00, #ff8c00);
  border: none; border-radius: 10px; padding: 14px;
  color: #fff; font-family: 'Exo 2', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  margin-top: 4px; letter-spacing: 0.5px; width: 100%;
}
.btn:hover { opacity: 0.9; }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

@media (max-width: 480px) {
  .box { padding: 28px 18px; }
  .row { grid-template-columns: 1fr; }
  .lang-btn { padding: 5px 10px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('uk')">🇺🇦 УКР</button>
  <button class="lang-btn" onclick="setLang('ru')">🇷🇺 РУС</button>
</div>

<div class="box">
  <div class="logo">
    <span class="logo-title">VØIDᴘʟᴀʏ</span>
    <span class="logo-sub" data-i="arena">Gaming Arena</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('reg')" data-i="tab_reg">Реєстрація</button>
    <button class="tab" onclick="switchTab('login')" data-i="tab_login">Увійти</button>
  </div>

  <!-- REGISTER -->
  <form id="reg-form" class="form show" onsubmit="doRegister(event)">
    <div class="row">
      <div class="field">
        <label data-i="lbl_first">Ім'я</label>
        <input type="text" id="r-first" data-ph="ph_first" autocomplete="given-name" required>
      </div>
      <div class="field">
        <label data-i="lbl_last">Прізвище</label>
        <input type="text" id="r-last" data-ph="ph_last" autocomplete="family-name" required>
      </div>
    </div>
    <div class="field">
      <label data-i="lbl_login">Логін</label>
      <input type="text" id="r-user" placeholder="ivan123" autocomplete="username" required>
    </div>
    <div class="field">
      <label data-i="lbl_birth">Рік народження</label>
      <input type="number" id="r-year" placeholder="2003" min="1900" max="2099" required>
    </div>
    <div class="field">
      <label data-i="lbl_pass">Пароль</label>
      <input type="password" id="r-pass" placeholder="••••••••" autocomplete="new-password" required>
    </div>
    <div class="error" id="reg-err"></div>
    <div class="success-box" id="reg-ok"></div>
    <button type="submit" class="btn" id="reg-btn" data-i="btn_reg">Зареєструватися →</button>
  </form>

  <!-- LOGIN -->
  <form id="login-form" class="form" onsubmit="doLogin(event)">
    <div class="field">
      <label data-i="lbl_login">Логін</label>
      <input type="text" id="l-user" placeholder="ivan123" autocomplete="username" required>
    </div>
    <div class="field">
      <label data-i="lbl_pass">Пароль</label>
      <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <div class="error" id="login-err"></div>
    <div class="success-box" id="login-ok"></div>
    <button type="submit" class="btn" id="login-btn" data-i="btn_login">Увійти →</button>
  </form>
</div>

<script>
const T = {
  uk: {
    arena:'Gaming Arena', tab_reg:'Реєстрація', tab_login:'Увійти',
    lbl_first:"Ім'я", lbl_last:'Прізвище', lbl_login:'Логін',
    lbl_birth:'Рік народження', lbl_pass:'Пароль',
    ph_first:'Іван', ph_last:'Петренко',
    btn_reg:'Зареєструватися →', btn_login:'Увійти →',
    err_year:'Введіть правильний рік народження',
    err_age:'❌ Реєстрація доступна лише з 13 років',
    err_short_user:'Логін мінімум 3 символи',
    err_short_pass:'Пароль мінімум 4 символи',
    err_taken:'Цей логін вже зайнятий',
    err_notfound:'Користувача не знайдено',
    err_wrong:'Невірний пароль',
    ok_reg:'✅ Акаунт створено! Переходимо...',
    ok_login:'✅ Вхід успішний! Переходимо...',
  },
  ru: {
    arena:'Gaming Arena', tab_reg:'Регистрация', tab_login:'Войти',
    lbl_first:'Имя', lbl_last:'Фамилия', lbl_login:'Логин',
    lbl_birth:'Год рождения', lbl_pass:'Пароль',
    ph_first:'Иван', ph_last:'Петренко',
    btn_reg:'Зарегистрироваться →', btn_login:'Войти →',
    err_year:'Введите правильный год рождения',
    err_age:'❌ Регистрация доступна только с 13 лет',
    err_short_user:'Логин минимум 3 символа',
    err_short_pass:'Пароль минимум 4 символа',
    err_taken:'Этот логин уже занят',
    err_notfound:'Пользователь не найден',
    err_wrong:'Неверный пароль',
    ok_reg:'✅ Аккаунт создан! Переходим...',
    ok_login:'✅ Вход выполнен! Переходим...',
  }
};

let lang = localStorage.getItem('nx_lang') || 'uk';

function setLang(l) {
  lang = l;
  localStorage.setItem('nx_lang', l);
  document.querySelectorAll('.lang-btn').forEach((b,i) =>
    b.classList.toggle('active', i === 0 ? l==='uk' : l==='ru'));
  const t = T[l];
  document.querySelectorAll('[data-i]').forEach(el => {
    const v = t[el.getAttribute('data-i')];
    if (v != null) el.textContent = v;
  });
  document.querySelectorAll('[data-ph]').forEach(el => {
    const v = t[el.getAttribute('data-ph')];
    if (v != null) el.placeholder = v;
  });
}

function getUsers() {
  try { return JSON.parse(localStorage.getItem('nx_users') || '{}'); }
  catch(e) { return {}; }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) =>
    t.classList.toggle('active', i === 0 ? tab==='reg' : tab==='login'));
  document.getElementById('reg-form').classList.toggle('show', tab==='reg');
  document.getElementById('login-form').classList.toggle('show', tab==='login');
}

function lockForm(ids) {
  ids.forEach(id => {
    var el = document.getElementById(id);
    if (el) el.disabled = true;
  });
}

function doRegister(e) {
  e.preventDefault();
  var t     = T[lang];
  var first = document.getElementById('r-first').value.trim();
  var last  = document.getElementById('r-last').value.trim();
  var user  = document.getElementById('r-user').value.trim().toLowerCase();
  var year  = parseInt(document.getElementById('r-year').value, 10);
  var pass  = document.getElementById('r-pass').value;
  var errEl = document.getElementById('reg-err');
  var okEl  = document.getElementById('reg-ok');

  errEl.classList.remove('show');
  okEl.classList.remove('show');

  var currentYear = new Date().getFullYear();
  var age = currentYear - year;

  if (!year || year < 1900 || year > currentYear) {
    errEl.textContent = t.err_year; errEl.classList.add('show'); return;
  }
  if (age < 13) {
    errEl.textContent = t.err_age; errEl.classList.add('show'); return;
  }
  if (user.length < 3) {
    errEl.textContent = t.err_short_user; errEl.classList.add('show'); return;
  }
  if (pass.length < 4) {
    errEl.textContent = t.err_short_pass; errEl.classList.add('show'); return;
  }

  var users = getUsers();
  if (users[user]) {
    errEl.textContent = t.err_taken; errEl.classList.add('show'); return;
  }

  var newUser = { first: first, last: last, user: user, year: year, pass: pass, balance: 200 };
  users[user] = newUser;
  localStorage.setItem('nx_users', JSON.stringify(users));
  localStorage.setItem('nx_session', JSON.stringify(newUser));

  okEl.textContent = t.ok_reg;
  okEl.classList.add('show');
  lockForm(['r-first','r-last','r-user','r-year','r-pass','reg-btn']);

  window.location.href = 'index.html';
}

function doLogin(e) {
  e.preventDefault();
  var t    = T[lang];
  var user = document.getElementById('l-user').value.trim().toLowerCase();
  var pass = document.getElementById('l-pass').value;
  var errEl = document.getElementById('login-err');
  var okEl  = document.getElementById('login-ok');

  errEl.classList.remove('show');
  okEl.classList.remove('show');

  var users = getUsers();
  if (!users[user]) {
    errEl.textContent = t.err_notfound; errEl.classList.add('show'); return;
  }
  if (users[user].pass !== pass) {
    errEl.textContent = t.err_wrong; errEl.classList.add('show'); return;
  }

  localStorage.setItem('nx_session', JSON.stringify(users[user]));

  okEl.textContent = t.ok_login;
  okEl.classList.add('show');
  lockForm(['l-user','l-pass','login-btn']);

  window.location.href = 'index.html';
}

setLang(lang);
</script>
</body>
</html>
