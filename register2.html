<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VØIDplay — Реєстрація</title>
<link rel="stylesheet" href="style.css">
<style>
body{display:flex;align-items:center;justify-content:center;padding:24px;
  background-image:radial-gradient(ellipse 60% 55% at 25% 55%,rgba(255,107,0,.09) 0%,transparent 65%),
    radial-gradient(ellipse 40% 40% at 75% 30%,rgba(255,107,0,.05) 0%,transparent 60%);}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(255,107,0,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,107,0,.025) 1px,transparent 1px);
  background-size:56px 56px;pointer-events:none;z-index:0;}
.box{background:#0f0f12;border:1px solid rgba(255,107,0,.22);border-radius:22px;
  padding:38px 34px;width:100%;max-width:430px;
  box-shadow:0 0 80px rgba(255,107,0,.07),0 40px 80px rgba(0,0,0,.5);
  position:relative;z-index:1;animation:fadeUp .5s ease both;}
.float-lang{position:fixed;top:16px;right:18px;display:flex;gap:6px;z-index:100;}
.logo-box{text-align:center;margin-bottom:30px;}
.logo-box .lt{font-size:30px;font-weight:900;letter-spacing:4px;
  background:linear-gradient(135deg,#ff6b00,#ff9500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;}
.logo-box .ls{font-size:10px;color:#404050;letter-spacing:5px;text-transform:uppercase;margin-top:3px;display:block;}
.tabs{display:flex;background:var(--surface2);border-radius:11px;padding:4px;margin-bottom:26px;gap:4px;}
.tab-btn{flex:1;padding:10px 8px;border:none;background:none;color:var(--muted);font-size:13px;font-weight:700;border-radius:9px;cursor:pointer;transition:all .2s;}
.tab-btn.active{background:var(--orange);color:#fff;}
.tab-panel{display:none;flex-direction:column;gap:14px;}
.tab-panel.show{display:flex;}
</style>
</head>
<body>
<div class="float-lang">
  <button class="lang-btn" data-lang="uk" onclick="setLang('uk')">🇺🇦 УКР</button>
  <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">🇷🇺 РУС</button>
</div>
<div class="box">
  <div class="logo-box">
    <span class="lt">VØIDᴘʟᴀʏ</span>
    <span class="ls" data-i="arena">Gaming Arena</span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" id="t-reg" onclick="sw('reg')" data-i="tab_reg">Реєстрація</button>
    <button class="tab-btn" id="t-login" onclick="sw('login')" data-i="tab_login">Увійти</button>
  </div>
  <div class="tab-panel show" id="p-reg">
    <div class="field-row">
      <div class="field"><label class="field-label" data-i="lbl_first">Ім'я</label>
        <input class="field-input" type="text" id="r-first" data-ph="ph_first" autocomplete="given-name"></div>
      <div class="field"><label class="field-label" data-i="lbl_last">Прізвище</label>
        <input class="field-input" type="text" id="r-last" data-ph="ph_last" autocomplete="family-name"></div>
    </div>
    <div class="field"><label class="field-label" data-i="lbl_login">Логін</label>
      <input class="field-input" type="text" id="r-user" placeholder="ivan123" autocomplete="username"></div>
    <div class="field"><label class="field-label" data-i="lbl_birth">Рік народження</label>
      <input class="field-input" type="number" id="r-year" placeholder="2003" min="1900" max="2099"></div>
    <div class="field"><label class="field-label" data-i="lbl_pass">Пароль</label>
      <input class="field-input" type="password" id="r-pass" placeholder="••••••••" autocomplete="new-password"></div>
    <div class="alert alert-error" id="reg-err"></div>
    <div class="alert alert-success" id="reg-ok"></div>
    <button class="btn btn-primary btn-full btn-lg" id="reg-btn" onclick="doReg()" data-i="btn_reg">Зареєструватися →</button>
  </div>
  <div class="tab-panel" id="p-login">
    <div class="field"><label class="field-label" data-i="lbl_login">Логін</label>
      <input class="field-input" type="text" id="l-user" placeholder="ivan123" autocomplete="username"></div>
    <div class="field"><label class="field-label" data-i="lbl_pass">Пароль</label>
      <input class="field-input" type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <div class="alert alert-error" id="login-err"></div>
    <div class="alert alert-success" id="login-ok"></div>
    <button class="btn btn-primary btn-full btn-lg" id="login-btn" onclick="doLogin()" data-i="btn_login">Увійти →</button>
  </div>
</div>
<script src="script.js"></script>
<script>
redirectIfLoggedIn();
setLang(currentLang);

function sw(tab) {
  document.getElementById('t-reg').classList.toggle('active', tab==='reg');
  document.getElementById('t-login').classList.toggle('active', tab==='login');
  document.getElementById('p-reg').classList.toggle('show', tab==='reg');
  document.getElementById('p-login').classList.toggle('show', tab==='login');
}
function lock(ids){ids.forEach(id=>{var e=document.getElementById(id);if(e)e.disabled=true;});}

function doReg() {
  var first=document.getElementById('r-first').value.trim(),
      last=document.getElementById('r-last').value.trim(),
      user=document.getElementById('r-user').value.trim().toLowerCase(),
      year=parseInt(document.getElementById('r-year').value,10),
      pass=document.getElementById('r-pass').value,
      err=document.getElementById('reg-err'), ok=document.getElementById('reg-ok');
  err.classList.remove('show'); ok.classList.remove('show');
  var now=new Date().getFullYear();
  if(!year||year<1900||year>now){err.textContent=t('err_year');err.classList.add('show');return;}
  if(now-year<13){err.textContent=t('err_age');err.classList.add('show');return;}
  if(user.length<3){err.textContent=t('err_user');err.classList.add('show');return;}
  if(pass.length<4){err.textContent=t('err_pass');err.classList.add('show');return;}
  if(!first){err.textContent="Введіть ім'я";err.classList.add('show');return;}
  var users=getUsers();
  if(users[user]){err.textContent=t('err_taken');err.classList.add('show');return;}
  var u={first,last,user,year,pass,balance:500,registered:new Date().toLocaleDateString('uk-UA'),nickname:first+' '+last};
  users[user]=u; saveUsers(users); saveSession(u);
  ok.textContent=t('ok_reg'); ok.classList.add('show');
  lock(['r-first','r-last','r-user','r-year','r-pass','reg-btn']);
  window.location.href='index.html';
}

function doLogin() {
  var user=document.getElementById('l-user').value.trim().toLowerCase(),
      pass=document.getElementById('l-pass').value,
      err=document.getElementById('login-err'), ok=document.getElementById('login-ok');
  err.classList.remove('show'); ok.classList.remove('show');
  var users=getUsers();
  if(!users[user]){err.textContent=t('err_notfound');err.classList.add('show');return;}
  if(users[user].pass!==pass){err.textContent=t('err_wrong');err.classList.add('show');return;}
  saveSession(users[user]);
  ok.textContent=t('ok_login'); ok.classList.add('show');
  lock(['l-user','l-pass','login-btn']);
  window.location.href='index.html';
}

document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  if(document.getElementById('p-reg').classList.contains('show'))doReg();
  else doLogin();
});
</script>
</body>
</html>
